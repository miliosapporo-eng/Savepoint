<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Point - 因果をつなぐ日記帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #0a0c10;
            --brand-main: #14181f;
            --brand-accent: #c4b5fd;
            --brand-muted: #94a3b8;
            --brand-text: #f8fafc;
        }
        body { background-color: var(--brand-dark); color: var(--brand-text); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        .bg-brand-main { background-color: var(--brand-main); }
        .bg-brand-dark { background-color: var(--brand-dark); }
        .text-brand-accent { color: var(--brand-accent); }
        .text-brand-muted { color: var(--brand-muted); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--brand-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Login Overlay */
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--brand-dark); display: flex; align-items: center; justify-content: center; transition: opacity 0.5s, visibility 0.5s; }
        #auth-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* 入力文字を黒にするためのスタイル修正 */
        .auth-input { 
            background-color: rgba(255, 255, 255, 0.95) !important; 
            color: #000000 !important; 
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .auth-input::placeholder { color: #888888 !important; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        @keyframes speaking { 0%, 100% { height: 2px; } 50% { height: 10px; border-radius: 50%; } }
        .bot-avatar { animation: float 3s ease-in-out infinite; cursor: pointer; }
        .bot-eye { animation: blink 4s infinite; }
        .bot-speaking #bot-mouth { animation: speaking 0.2s infinite; }

        .chat-bubble-bot { border-radius: 20px 20px 20px 4px; }
        .chat-bubble-user { border-radius: 20px 20px 4px 20px; }
        
        .drop-zone { border: 2px dashed rgba(255,255,255,0.05); min-height: 50px; border-radius: 12px; transition: all 0.3s; display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; align-items: center; }
        .habit-chip { cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; font-size: 10px; padding: 4px 10px; border-radius: 99px; }
        .habit-chip.active { background-color: var(--brand-accent); color: var(--brand-dark); font-weight: bold; border-color: var(--brand-accent); }
        
        .photo-slot { aspect-ratio: 1; border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; transition: all 0.3s; }
        .clinic-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; padding: 4px 0; font-size: 11px; }

        #history-sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="max-w-md w-full p-10 text-center bg-brand-main/90 rounded-[3rem] border border-white/10 backdrop-blur-2xl shadow-2xl">
            <div class="bot-avatar relative w-24 h-24 flex items-center justify-center bg-brand-dark rounded-[2.5rem] border border-brand-accent/30 mx-auto mb-8">
                <div class="w-12 h-12 flex flex-col items-center justify-center gap-2">
                    <div class="flex gap-3">
                        <div class="bot-eye w-2 h-2 bg-brand-accent rounded-full"></div>
                        <div class="bot-eye w-2 h-2 bg-brand-accent rounded-full"></div>
                    </div>
                    <div class="w-5 h-1 border-b-2 border-brand-accent/50 rounded-full"></div>
                </div>
            </div>
            <h1 class="font-serif text-4xl font-bold mb-2 tracking-tighter text-brand-text">Save Point</h1>
            <p id="auth-sub-msg" class="text-brand-muted text-[10px] mb-10 uppercase tracking-widest font-bold">Health Information Connector</p>
            
            <div class="space-y-5 text-left">
                <div id="reg-name-field" class="hidden">
                    <label class="text-[9px] text-brand-accent font-bold uppercase tracking-widest block mb-1.5 ml-2">Display Name</label>
                    <input type="text" id="reg-name" class="auth-input w-full rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-brand-accent/50 transition-all text-sm font-bold" placeholder="お名前">
                </div>
                <div>
                    <label class="text-[9px] text-brand-accent font-bold uppercase tracking-widest block mb-1.5 ml-2">Email Address</label>
                    <input type="email" id="auth-email" class="auth-input w-full rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-brand-accent/50 transition-all text-sm font-bold" placeholder="メールアドレス">
                </div>
                <div>
                    <label class="text-[9px] text-brand-accent font-bold uppercase tracking-widest block mb-1.5 ml-2">Password</label>
                    <input type="password" id="auth-pw" class="auth-input w-full rounded-2xl py-4 px-6 focus:outline-none focus:ring-2 focus:ring-brand-accent/50 transition-all text-sm font-bold" placeholder="パスワード">
                </div>
                <button id="auth-submit-btn" class="w-full bg-brand-accent text-brand-dark font-bold py-4 rounded-2xl hover:scale-[1.02] transition-transform mt-4 shadow-lg shadow-brand-accent/20">ログイン</button>
                <div class="text-center mt-6">
                    <button id="auth-toggle" class="text-[10px] text-brand-muted hover:text-brand-accent underline underline-offset-4">新しくアカウントを作成する</button>
                </div>
                <!-- エラー表示エリア -->
                <div id="auth-error" class="bg-red-500/10 border border-red-500/20 rounded-xl p-3 text-red-400 text-[10px] mt-4 hidden font-bold leading-relaxed"></div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="border-b border-white/10 bg-brand-main/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-brand-accent rounded flex items-center justify-center text-brand-dark shadow-lg">
                    <i class="fa-solid fa-floppy-disk"></i>
                </div>
                <h1 class="font-serif font-bold text-xl tracking-tighter">Save Point</h1>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <span id="user-display" class="text-[10px] text-brand-accent font-bold bg-brand-accent/10 px-3 py-1 rounded-full hidden"></span>
                <button id="history-btn" class="text-brand-muted hover:text-brand-accent px-2"><i class="fa-solid fa-clock-rotate-left"></i></button>
                <input type="date" id="date-picker" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs focus:outline-none focus:border-brand-accent">
                <button id="save-btn" class="bg-brand-accent/10 hover:bg-brand-accent/20 text-brand-accent border border-brand-accent/30 px-4 py-1 rounded text-sm font-bold">セーブ</button>
                <button id="logout-btn" class="text-brand-muted hover:text-red-400 p-2"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
    </header>

    <main id="app-content" class="flex-1 container mx-auto px-4 py-8 blur-2xl pointer-events-none transition-all duration-1000">
        
        <!-- SAVE-KUN Bot Section -->
        <div class="max-w-4xl mx-auto mb-12">
            <div class="bg-brand-main rounded-[3rem] p-8 md:p-12 border-2 border-white/5 relative overflow-hidden shadow-2xl">
                <div class="flex flex-col md:flex-row items-center gap-10">
                    <div class="flex flex-col items-center shrink-0">
                        <div id="savekun-avatar" class="bot-avatar relative w-28 h-28 flex items-center justify-center bg-brand-dark rounded-[2.5rem] border border-brand-accent/30 shadow-2xl">
                            <div class="w-16 h-16 flex flex-col items-center justify-center gap-2.5">
                                <div class="flex gap-3.5">
                                    <div class="bot-eye w-2.5 h-2.5 bg-brand-accent rounded-full"></div>
                                    <div class="bot-eye w-2.5 h-2.5 bg-brand-accent rounded-full"></div>
                                </div>
                                <div id="bot-mouth" class="w-7 h-1.5 border-b-2 border-brand-accent/50 rounded-full"></div>
                            </div>
                            <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-400 rounded-full border-4 border-brand-main shadow-lg"></div>
                        </div>
                        <h2 class="mt-4 font-serif text-xl font-bold text-brand-accent tracking-widest uppercase">SAVE-KUN</h2>
                    </div>

                    <div class="flex-1 w-full flex flex-col min-h-[200px]">
                        <div id="chat-container" class="flex-1 bg-brand-dark/40 rounded-[2.5rem] p-6 overflow-y-auto mb-5 text-xs space-y-4 max-h-[160px] scroll-smooth">
                            <div class="chat-bubble-bot bg-brand-main border border-white/10 p-4 max-w-[90%] text-brand-text/90 leading-relaxed shadow-lg">
                                やあ！ログインできたね。今日の身体の調子を記録しておこう。
                            </div>
                        </div>
                        <div class="relative flex items-center gap-3">
                            <input type="text" id="chat-input" class="flex-1 bg-brand-dark border-2 border-white/5 rounded-full py-4 px-7 text-xs focus:outline-none focus:border-brand-accent/40 transition-all" placeholder="話しかける...">
                            <button id="send-chat" class="w-14 h-14 bg-brand-accent/10 text-brand-accent rounded-full hover:scale-105 flex items-center justify-center shadow-xl">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="max-w-7xl mx-auto bg-brand-main rounded-2xl border border-white/10 shadow-2xl overflow-hidden mb-12">
            <div class="grid grid-cols-1 md:grid-cols-12 min-h-[600px] divide-y md:divide-y-0 md:divide-x divide-white/10">
                <div class="md:col-span-3 bg-brand-dark/20 p-8 flex flex-col">
                    <h3 class="font-serif text-sm font-bold tracking-widest uppercase text-brand-muted mb-6"><i class="fa-solid fa-history mr-2"></i>Past</h3>
                    <textarea id="field-past" class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-serif leading-loose resize-none" placeholder="過去の要因..."></textarea>
                </div>
                <div class="md:col-span-6 bg-brand-main flex flex-col">
                    <div class="p-6 border-b border-white/10 flex items-center justify-between px-8 bg-brand-accent/5">
                        <h3 id="display-date" class="font-serif text-brand-accent font-bold tracking-widest">202X.XX.XX</h3>
                        <label class="cursor-pointer text-brand-accent"><i class="fa-solid fa-camera"></i><input type="file" id="quick-photo-input" class="hidden" accept="image/*"></label>
                    </div>
                    <div class="p-6 bg-brand-dark/40 border-b border-white/10 flex flex-wrap gap-2 px-8">
                        <span class="habit-chip" data-value="食いしばり">食いしばり</span>
                        <span class="habit-chip" data-value="足を組む">足を組む</span>
                        <span class="habit-chip" data-value="猫背">猫背</span>
                    </div>
                    <div class="flex-1 overflow-y-auto max-h-[450px]">
                        <div class="p-8 border-b border-white/5"><textarea id="field-morning" class="w-full bg-transparent border-none focus:ring-0 text-sm min-h-[80px]" placeholder="Morning..."></textarea></div>
                        <div class="p-8 border-b border-white/5"><textarea id="field-afternoon" class="w-full bg-transparent border-none focus:ring-0 text-sm min-h-[80px]" placeholder="Afternoon..."></textarea></div>
                        <div class="p-8"><textarea id="field-evening" class="w-full bg-transparent border-none focus:ring-0 text-sm min-h-[80px]" placeholder="Evening..."></textarea></div>
                    </div>
                </div>
                <div class="md:col-span-3 bg-brand-dark/20 p-8 flex flex-col">
                    <h3 class="font-serif text-sm font-bold tracking-widest uppercase text-brand-muted mb-6"><i class="fa-solid fa-paper-plane mr-2 text-xs"></i>Future</h3>
                    <textarea id="field-future" class="flex-1 bg-transparent border-none focus:ring-0 text-sm font-serif leading-loose resize-none" placeholder="明日への対策..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <!-- UI Overlay Elements -->
    <div id="history-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity"></div>
    <div id="history-sidebar" class="fixed top-0 right-0 h-full w-full max-w-sm bg-brand-main border-l border-white/10 z-[70] p-10 shadow-2xl flex flex-col translate-x-full transition-transform">
        <h2 class="font-serif text-2xl font-bold text-brand-accent mb-8 text-center tracking-widest">HISTORY</h2>
        <div id="history-list" class="flex-1 space-y-4 overflow-y-auto pr-2"></div>
        <button id="close-history" class="mt-10 text-[10px] text-brand-muted uppercase tracking-[0.3em] hover:text-white">Close Log</button>
    </div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-brand-accent text-brand-dark px-8 py-3 rounded-full font-bold text-xs opacity-0 pointer-events-none transition-opacity shadow-2xl z-[100]">SAVED SUCCESS</div>

    <script>
        // --- GAS設定：ここに発行されたURLを必ず貼り付けてください ---
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbysQ9Hvxt9vOSDoVqGx1ubKPFDbmc36zIQ_SuVS2s7patF4N18klIZygvizwFcY1l95ww/exec"; 

        const DB_NAME = 'SavePointDB_vFinal';
        let db;
        let isRegisterMode = false;

        const request = indexedDB.open(DB_NAME, 1);
        request.onsuccess = (e) => { db = e.target.result; checkLoginState(); };
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore('logs', { keyPath: 'date' }); };

        // --- 認証ロジック ---
        const authBtn = document.getElementById('auth-submit-btn');
        const authToggle = document.getElementById('auth-toggle');
        const regNameField = document.getElementById('reg-name-field');
        const errorEl = document.getElementById('auth-error');

        authToggle.onclick = () => {
            isRegisterMode = !isRegisterMode;
            regNameField.classList.toggle('hidden');
            authBtn.innerText = isRegisterMode ? "アカウントを作成" : "ログイン";
            authToggle.innerText = isRegisterMode ? "ログインへ戻る" : "新しくアカウントを作成する";
            errorEl.classList.add('hidden');
        };

        authBtn.onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pw').value;
            const name = document.getElementById('reg-name').value;

            if (!email || !password || (isRegisterMode && !name)) {
                errorEl.innerText = "すべての項目を入力してください。";
                errorEl.classList.remove('hidden');
                return;
            }

            authBtn.disabled = true;
            authBtn.innerText = isRegisterMode ? "登録中..." : "ログイン中...";
            errorEl.classList.add('hidden');

            try {
                if (!GAS_WEBAPP_URL) {
                    // GAS未設定時のテスト用（admin@test.com / 1234）
                    if (!isRegisterMode && email === "admin@test.com" && password === "1234") {
                        onAuthSuccess({ id: email, name: "管理者" });
                    } else if (isRegisterMode) {
                        alert("登録申請を受け付けました（モック）");
                        location.reload();
                    } else { 
                        throw new Error("GASのURLが設定されていません。テスト用 ID: admin@test.com / PW: 1234 を試すか、GASのURLを貼り付けてください。"); 
                    }
                } else {
                    const action = isRegisterMode ? 'register' : 'login';
                    const res = await fetch(GAS_WEBAPP_URL, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain' }, // GASの制約上 text/plain を使用
                        body: JSON.stringify({ action, email, password, name })
                    });
                    
                    if (!res.ok) throw new Error("サーバーとの通信に失敗しました。");
                    
                    const result = await res.json();
                    if (result.success && !isRegisterMode) {
                        onAuthSuccess(result.user);
                    } else if (result.success && isRegisterMode) {
                        alert(result.message);
                        location.reload();
                    } else {
                        throw new Error(result.message || "認証に失敗しました。");
                    }
                }
            } catch (err) {
                errorEl.innerText = "【エラー】 " + err.message;
                errorEl.classList.remove('hidden');
                authBtn.disabled = false;
                authBtn.innerText = isRegisterMode ? "アカウントを作成" : "ログイン";
            }
        };

        function onAuthSuccess(user) {
            sessionStorage.setItem('savepoint_user', JSON.stringify(user));
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('app-content').classList.remove('blur-2xl', 'pointer-events-none');
            document.getElementById('user-display').innerText = user.name;
            document.getElementById('user-display').classList.remove('hidden');
            loadCurrentDate();
        }

        function checkLoginState() {
            const saved = sessionStorage.getItem('savepoint_user');
            if (saved) onAuthSuccess(JSON.parse(saved));
        }

        document.getElementById('logout-btn').onclick = () => { sessionStorage.removeItem('savepoint_user'); location.reload(); };

        // --- アプリ基本ロジック ---
        let currentDate = new Date().toISOString().split('T')[0];
        const fields = ['field-past', 'field-morning', 'field-afternoon', 'field-evening', 'field-future'];

        function loadCurrentDate() {
            document.getElementById('date-picker').value = currentDate;
            document.getElementById('display-date').innerText = new Date(currentDate).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
            
            db.transaction(['logs'], 'readonly').objectStore('logs').get(currentDate).onsuccess = (e) => {
                const d = e.target.result || {};
                fields.forEach(id => document.getElementById(id).value = d[id.split('-')[1]] || "");
                document.querySelectorAll('.habit-chip').forEach(c => c.classList.toggle('active', (d.habits || []).includes(c.dataset.value)));
            };
        }

        function saveData() {
            const data = {
                date: currentDate,
                habits: Array.from(document.querySelectorAll('.habit-chip.active')).map(c => c.dataset.value)
            };
            fields.forEach(id => data[id.split('-')[1]] = document.getElementById(id).value);
            db.transaction(['logs'], 'readwrite').objectStore('logs').put(data);
            const t = document.getElementById('toast'); t.classList.remove('opacity-0'); setTimeout(() => t.classList.add('opacity-0'), 2000);
        }

        document.getElementById('save-btn').onclick = saveData;
        document.getElementById('date-picker').onchange = (e) => { currentDate = e.target.value; loadCurrentDate(); };
        document.querySelectorAll('.habit-chip').forEach(c => c.onclick = () => { c.classList.toggle('active'); saveData(); });
        
        // 履歴表示
        document.getElementById('history-btn').onclick = () => {
            document.getElementById('history-sidebar').classList.remove('translate-x-full');
            document.getElementById('history-overlay').classList.remove('opacity-0', 'pointer-events-none');
            db.transaction(['logs'],'readonly').objectStore('logs').getAll().onsuccess = (e) => {
                document.getElementById('history-list').innerHTML = e.target.result.sort((a,b)=>b.date.localeCompare(a.date)).map(l => `<div class="p-4 border border-white/5 bg-brand-dark/30 rounded-2xl cursor-pointer hover:border-brand-accent/50 transition-all text-xs font-bold text-brand-accent" onclick="currentDate='${l.date}';loadCurrentDate();document.getElementById('close-history').click();">${l.date}</div>`).join('');
            };
        };
        document.getElementById('close-history').onclick = () => { document.getElementById('history-sidebar').classList.add('translate-x-full'); document.getElementById('history-overlay').classList.add('opacity-0', 'pointer-events-none'); };
    </script>
</body>
</html>
